name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Format check
        run: dotnet format --verify-no-changes --no-restore

  deploy-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      PUBLISH_DIR: publish-ec2
      ARCHIVE_NAME: thiscafeteria-web.tgz
      REMOTE_APP_DIR: /opt/thiscafeteria
      REMOTE_SERVICE: thiscafeteria
      REMOTE_TMP_ARCHIVE: /tmp/thiscafeteria-web.tgz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish web app
        run: |
          dotnet publish src/ThisCafeteria.Web/ThisCafeteria.Web.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            --output "$PUBLISH_DIR"

      - name: Pack artifact
        run: tar -czf "$ARCHIVE_NAME" -C "$PUBLISH_DIR" .

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/thiscafeteria-ec2
          chmod 600 ~/.ssh/thiscafeteria-ec2
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy artifact to EC2
        run: |
          scp -i ~/.ssh/thiscafeteria-ec2 \
            "$ARCHIVE_NAME" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:$REMOTE_TMP_ARCHIVE"

      - name: Install artifact and restart service
        run: |
          ssh -i ~/.ssh/thiscafeteria-ec2 \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "sudo systemctl stop $REMOTE_SERVICE && \
             sudo rm -rf $REMOTE_APP_DIR/* && \
             sudo tar -xzf $REMOTE_TMP_ARCHIVE -C $REMOTE_APP_DIR && \
             sudo chmod +x $REMOTE_APP_DIR/ThisCafeteria.Web && \
             sudo systemctl start $REMOTE_SERVICE && \
             sudo systemctl status $REMOTE_SERVICE --no-pager -l"

      - name: Verify public health
        run: curl --fail --show-error --silent "http://${{ secrets.EC2_HOST }}/health"
