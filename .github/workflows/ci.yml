name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Format check
        run: dotnet format --verify-no-changes --no-restore

  deploy-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      PUBLISH_DIR: publish-ec2
      ARCHIVE_NAME: thiscafeteria-web.tgz
      REMOTE_APP_DIR: /opt/thiscafeteria
      REMOTE_SERVICE: thiscafeteria
      REMOTE_TMP_ARCHIVE: /tmp/thiscafeteria-web.tgz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish web app
        run: |
          dotnet publish src/ThisCafeteria.Web/ThisCafeteria.Web.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            --output "$PUBLISH_DIR"

      - name: Pack artifact
        run: tar -czf "$ARCHIVE_NAME" -C "$PUBLISH_DIR" .

      - name: Prepare SSH key
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_HOST_KEY: ${{ secrets.EC2_HOST_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -z "${EC2_SSH_PRIVATE_KEY:-}" ]; then
            echo "EC2_SSH_PRIVATE_KEY secret is not configured." >&2
            exit 1
          fi

          if [ -z "${EC2_HOST:-}" ]; then
            echo "EC2_HOST secret is not configured." >&2
            exit 1
          fi

          host="${EC2_HOST#http://}"
          host="${host#https://}"
          host="${host%%/*}"

          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/thiscafeteria-ec2
          chmod 600 ~/.ssh/thiscafeteria-ec2

          if ! ssh-keygen -y -f ~/.ssh/thiscafeteria-ec2 >/dev/null 2>&1; then
            echo "EC2_SSH_PRIVATE_KEY is not a valid OpenSSH private key." >&2
            exit 1
          fi

          touch ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          if [ -n "${EC2_HOST_KEY:-}" ]; then
            printf '%s\n' "$EC2_HOST_KEY" >> ~/.ssh/known_hosts
          elif ! ssh-keyscan -T 15 -H "$host" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "ssh-keyscan could not fetch a host key for ${host}." >&2
            echo "Open EC2 port 22 to GitHub Actions, or add an EC2_HOST_KEY secret." >&2
            exit 1
          fi

          echo "EC2_HOST=$host" >> "$GITHUB_ENV"

      - name: Copy artifact to EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/thiscafeteria-ec2 \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -o ConnectTimeout=30 \
            "$ARCHIVE_NAME" \
            "${EC2_USER}@${EC2_HOST}:$REMOTE_TMP_ARCHIVE"

      - name: Install artifact and restart service
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/thiscafeteria-ec2 \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -o ConnectTimeout=30 \
            "${EC2_USER}@${EC2_HOST}" \
            "sudo systemctl stop $REMOTE_SERVICE && \
             sudo rm -rf $REMOTE_APP_DIR/* && \
             sudo tar -xzf $REMOTE_TMP_ARCHIVE -C $REMOTE_APP_DIR && \
             sudo chmod +x $REMOTE_APP_DIR/ThisCafeteria.Web && \
             sudo systemctl start $REMOTE_SERVICE && \
             sudo systemctl status $REMOTE_SERVICE --no-pager -l"

      - name: Verify public health
        run: curl --fail --show-error --silent "http://${EC2_HOST}/health"
